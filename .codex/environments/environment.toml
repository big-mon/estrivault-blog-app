version = 1
name = "estrivault-blog-app"

[setup]
script = """
$ErrorActionPreference = "Stop"

pnpm install --frozen-lockfile
if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

pnpm run build:packages
if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

pnpm validate:workspace
if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
"""
