name: CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ASTRO_TELEMETRY_DISABLED: '1'
  CI: true

jobs:
  astro-blog:
    name: Lint and E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Lint astro-blog
        run: pnpm --filter astro-blog lint

      - name: Check astro-blog
        run: pnpm --filter astro-blog check

      - name: Get Playwright version
        id: playwright-version
        shell: bash
        run: |
          echo "version=$(pnpm --filter astro-blog exec playwright --version | sed 's/^Version //')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Set up Playwright Chromium
        run: pnpm --filter astro-blog run setup:e2e

      - name: Run Playwright E2E
        run: pnpm --filter astro-blog test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          if-no-files-found: ignore
          path: |
            apps/astro-blog/test-results
            apps/astro-blog/playwright-report
